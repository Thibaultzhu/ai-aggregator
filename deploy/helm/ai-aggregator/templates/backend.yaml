apiVersion: v1
kind: Secret
metadata:
  name: ai-aggregator-backend-secrets
type: Opaque
stringData:
  DATABASE_URL: {{ required "backend.secrets.DATABASE_URL is required" .Values.backend.secrets.DATABASE_URL | quote }}
  REDIS_URL: {{ required "backend.secrets.REDIS_URL is required" .Values.backend.secrets.REDIS_URL | quote }}
  JWT_SECRET: {{ required "backend.secrets.JWT_SECRET is required" .Values.backend.secrets.JWT_SECRET | quote }}
  DASHSCOPE_API_KEY: {{ .Values.backend.secrets.DASHSCOPE_API_KEY | quote }}
  DASHSCOPE_API_KEY_CN: {{ .Values.backend.secrets.DASHSCOPE_API_KEY_CN | quote }}
  DASHSCOPE_API_KEY_INTL: {{ .Values.backend.secrets.DASHSCOPE_API_KEY_INTL | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-aggregator-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: ai-aggregator-backend
  template:
    metadata:
      labels:
        app: ai-aggregator-backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.image.backend | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $_ := .Values.backend.secrets }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: ai-aggregator-backend-secrets
                  key: {{ $key }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-aggregator-backend
spec:
  type: {{ .Values.service.type }}
  selector:
    app: ai-aggregator-backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
